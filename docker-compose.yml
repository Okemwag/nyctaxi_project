services:
  postgres:
    image: postgres:16
    container_name: nyctaxi-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
      AIRFLOW_DB: ${AIRFLOW_DB:-airflow}
      WAREHOUSE_DB: ${WAREHOUSE_DB:-nyctaxi}
      METABASE_DB: ${METABASE_DB:-metabase}
      WAREHOUSE_USER: ${WAREHOUSE_USER:-warehouse}
      WAREHOUSE_PASSWORD: ${WAREHOUSE_PASSWORD:-warehouse}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    container_name: nyctaxi-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minio} ${MINIO_ROOT_PASSWORD:-minio123} &&
      mc mb --ignore-existing local/${RAW_BUCKET:-nyctaxi-lake} &&
      mc anonymous set private local/${RAW_BUCKET:-nyctaxi-lake}
      "

  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres/${AIRFLOW_DB:-airflow}
      AIRFLOW__WEBSERVER__SECRET_KEY: nyctaxi-airflow-secret
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      PYTHONPATH: /opt/project/ingest/src
      DBT_PROFILES_DIR: /opt/project/dbt
      WAREHOUSE_HOST: postgres
      WAREHOUSE_PORT: 5432
      WAREHOUSE_DB: ${WAREHOUSE_DB:-nyctaxi}
      WAREHOUSE_USER: ${WAREHOUSE_USER:-warehouse}
      WAREHOUSE_PASSWORD: ${WAREHOUSE_PASSWORD:-warehouse}
      WAREHOUSE_DSN: postgresql://${WAREHOUSE_USER:-warehouse}:${WAREHOUSE_PASSWORD:-warehouse}@postgres:5432/${WAREHOUSE_DB:-nyctaxi}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      RAW_BUCKET: ${RAW_BUCKET:-nyctaxi-lake}
      SOURCE_BASE_URL: ${SOURCE_BASE_URL:-https://d37ci6vzurychx.cloudfront.net/trip-data}
      ZONE_LOOKUP_URL: ${ZONE_LOOKUP_URL:-https://d37ci6vzurychx.cloudfront.net/misc/taxi_zone_lookup.csv}
      AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
      AIRFLOW_ADMIN_FIRSTNAME: ${AIRFLOW_ADMIN_FIRSTNAME:-Data}
      AIRFLOW_ADMIN_LASTNAME: ${AIRFLOW_ADMIN_LASTNAME:-Engineer}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-admin@example.com}
    volumes:
      - .:/opt/project
      - airflow-logs:/opt/airflow/logs
    user: "${AIRFLOW_UID:-50000}:0"
    entrypoint: /bin/bash
    command: >
      -lc "
      airflow db migrate &&
      airflow users create
      --role Admin
      --username ${AIRFLOW_ADMIN_USER:-admin}
      --password ${AIRFLOW_ADMIN_PASSWORD:-admin}
      --firstname ${AIRFLOW_ADMIN_FIRSTNAME:-Data}
      --lastname ${AIRFLOW_ADMIN_LASTNAME:-Engineer}
      --email ${AIRFLOW_ADMIN_EMAIL:-admin@example.com}
      || true
      "

  airflow-webserver:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: nyctaxi-airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes:
      - .:/opt/project
      - airflow-logs:/opt/airflow/logs
    user: "${AIRFLOW_UID:-50000}:0"
    command: webserver
    ports:
      - "8080:8080"

  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: nyctaxi-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes:
      - .:/opt/project
      - airflow-logs:/opt/airflow/logs
    user: "${AIRFLOW_UID:-50000}:0"
    command: scheduler

  dbt:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: nyctaxi-dbt
    depends_on:
      postgres:
        condition: service_healthy
    environment: *airflow-env
    volumes:
      - .:/opt/project
    user: "${AIRFLOW_UID:-50000}:0"
    entrypoint: /bin/bash
    command: -lc "sleep infinity"

  metabase:
    image: metabase/metabase:v0.54.5
    container_name: nyctaxi-metabase
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${METABASE_DB:-metabase}
      MB_DB_HOST: postgres
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER:-postgres}
      MB_DB_PASS: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "3000:3000"
    volumes:
      - metabase-data:/metabase-data

volumes:
  postgres-data:
  minio-data:
  airflow-logs:
  metabase-data:

